# ──────────────────────────────────────────────────────────────
# vLLM Edge Inference — sample job specification
# Deploy on Sage Thor node (128GB unified memory, Blackwell GPU)
# Scene description every 2 minutes using Qwen3-VL-32B-Instruct
# ──────────────────────────────────────────────────────────────
name: vllm-scene-description
plugins:
  - name: vllm-edge-inference
    pluginSpec:
      image: registry.sagecontinuum.org/waggle/vllm-edge-inference:0.2.0
      args:
        - "--stream"
        - "bottom_camera"
        - "--model"
        - "Qwen/Qwen3-VL-32B-Instruct"
        - "--interval"
        - "120"
        - "--gpu-mem-frac"
        - "0.58"
        - "--max-model-len"
        - "4096"
        - "--dtype"
        - "bfloat16"
        - "--enforce-eager"
        - "--max-tokens"
        - "256"
        - "--temperature"
        - "0.3"
        - "--continuous"
        - "Y"
        - "--upload-image"
        - "Y"
      selector:
        resource.gpu: "true"
nodes:
  W097: true
scienceRules:
  - "schedule(vllm-edge-inference): cronjob('vllm-edge-inference', '*/5 * * * *')"
