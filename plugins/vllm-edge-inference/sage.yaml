name: "vllm-edge-inference"
namespace: "waggle"
version: "0.1.0"
description: "Vision-language model inference at the edge — runs Qwen3-VL-32B-Instruct via vLLM to generate natural-language scene descriptions and summaries from camera images in real-time."
authors: "Pete Beckman <pete.beckman@northwestern.edu>"
collaborators: "Waggle Team <https://wa8.gl>"
funding: "NSF 1935984"
license: "The license agreed by Argonne National Laboratory"
keywords: "LLM, VLM, vLLM, scene description, vision-language, camera, inference, Qwen, natural language"
homepage: "https://github.com/waggle-sensor/plugin-vllm-edge-inference/blob/main/ecr-meta/ecr-science-description.md"
source:
    architectures:
        - "linux/arm64"
        - "linux/amd64"
    url: "https://github.com/waggle-sensor/plugin-vllm-edge-inference.git"
    branch: "main"
inputs:
    - id: "stream"
      type: "string"
      description: "Camera stream name (e.g. bottom_camera, top_camera) or RTSP URL"
    - id: "model"
      type: "string"
      description: "HuggingFace VLM model ID (default: Qwen/Qwen3-VL-32B-Instruct)"
    - id: "interval"
      type: "int"
      description: "Seconds between captures (default: 120)"
    - id: "vllm-port"
      type: "int"
      description: "Port for the local vLLM OpenAI-compatible server (default: 8000)"
    - id: "vllm-url"
      type: "string"
      description: "Override vLLM base URL — if set, skips auto-launching the vLLM server"
    - id: "gpu-mem-frac"
      type: "float"
      description: "GPU memory fraction for vLLM. Use 0.58 for 128GB unified memory, 0.85 for discrete GPU (default: 0.58)"
    - id: "max-model-len"
      type: "int"
      description: "Maximum context length in tokens (default: 4096)"
    - id: "dtype"
      type: "string"
      description: "Model data type: bfloat16 (default, recommended), float16, half, auto"
    - id: "max-tokens"
      type: "int"
      description: "Maximum tokens in the LLM response (default: 512)"
    - id: "temperature"
      type: "float"
      description: "Sampling temperature 0.0–1.0 (default: 0.3)"
    - id: "enforce-eager"
      type: "string"
      description: "Y = skip CUDA graph capture, saves ~5GB GPU memory. Required for 32B+ models on 128GB unified memory (default: N)"
    - id: "prompt"
      type: "string"
      description: "VLM prompt for detailed scene description"
    - id: "summary-prompt"
      type: "string"
      description: "VLM prompt for one-line scene summary"
    - id: "continuous"
      type: "string"
      description: "Y = continuous loop (default), N = single-shot inference"
    - id: "upload-image"
      type: "string"
      description: "Y = upload source image each cycle (default: Y)"
resources:
    - type: "GPU"
      min_memory: "128GB"
      note: "Requires 128GB unified or 80GB+ discrete GPU for Qwen3-VL-32B"
    - type: "RGB_image_producer"
      view: "street"
      min_resolution: "640x480"
metadata:
    ontology: env.scene.*
testing:
    mask_entrypoint: true
    command: ["python3", "-m", "pytest", "tests/test_vllm.py", "-v"]
