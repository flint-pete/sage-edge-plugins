name: "bioclip-species-classifier"
namespace: "waggle"
version: "0.2.0"
description: "BioCLIP2 species classifier — identifies organisms at any taxonomic rank (Kingdom through Species) from camera images using the TreeOfLife-200M-trained BioCLIP2 model (~430M params)."
authors: "Pete Beckman <pete.beckman@northwestern.edu>"
collaborators: "Waggle Team <https://wa8.gl>"
funding: "NSF 1935984"
license: "The license agreed by Argonne National Laboratory"
keywords: "species classification, biodiversity, BioCLIP, ecology, camera, taxonomy, wildlife, conservation"
homepage: "https://github.com/flint-pete/sage-edge-plugins/blob/main/plugins/bioclip-species-classifier/ecr-meta/ecr-science-description.md"
source:
    architectures:
        - "linux/arm64"
        - "linux/amd64"
    url: "https://github.com/flint-pete/sage-edge-plugins.git"
    branch: "main"
inputs:
    - id: "stream"
      type: "string"
      description: "Camera stream name (e.g. bottom_camera) or RTSP URL"
    - id: "image-dir"
      type: "string"
      description: "Directory of test images for local batch testing (replaces --stream)"
    - id: "rank"
      type: "string"
      description: "Taxonomic rank for classification: Kingdom, Phylum, Class, Order, Family, Genus, or Species (default: Class)"
    - id: "model"
      type: "string"
      description: "BioCLIP model string (default: hf-hub:imageomics/bioclip-2)"
    - id: "interval"
      type: "int"
      description: "Seconds between captures (default: 60)"
    - id: "min-confidence"
      type: "float"
      description: "Minimum confidence score to publish a prediction (default: 0.1)"
    - id: "top-k"
      type: "int"
      description: "Number of top predictions to publish per frame (default: 5)"
    - id: "continuous"
      type: "string"
      description: "Y = continuous loop (default), N = single-shot classification"
resources:
    - type: "RGB_image_producer"
      view: "ground"
      min_resolution: "640x480"
metadata:
    ontology: env.species.*
testing:
    mask_entrypoint: true
    command: ["python3", "tests/test_bioclip_local.py"]
